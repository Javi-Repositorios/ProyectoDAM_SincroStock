name: Deploy to Server

on:
  push:
    branches:
      - main # Cambie a 'master' si su rama principal se llama así

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Ejecutar comandos en el servidor vía SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /root/sincrostock
            git pull origin main
            # Agregue aquí comandos adicionales si su app lo requiere:
            # npm install
            # pm2 restart app