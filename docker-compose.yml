services:
  db:
    image: postgres:15-alpine
    container_name: postgres_sincrostock
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: sincrostock
    ports:
      - "5432:5432"
    volumes:
      - ./servidorspring-data:/var/lib/postgresql/data

  app:
    image: maven:3.9-eclipse-temurin-21
    container_name: server_sincrostock
    working_dir: /app
    volumes:
      - ./server_backend:/app
    # IMPORTANTE: Ya no exponemos el 8080 al exterior, solo Nginx lo verá internamente
    # ports:
    #   - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/sincrostock
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=1234
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      - db
    command: mvn spring-boot:run -Dspring-boot.run.arguments="--skipTests" -Dmaven.test.skip=true

  gateway:
    image: nginx:alpine
    container_name: cliente_sincrostock
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./cliente_frontend:/usr/share/nginx/html:ro # <---  copia el contenido de frontend en su carpeta html
    depends_on:
      - app