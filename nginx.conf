events {
    worker_connections 1024;
}

http {
    # Incluimos los tipos MIME para que el navegador entienda el CSS y JS
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;
        server_name localhost;

        # 1. Donde están tus archivos HTML (Frontend)
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ =404;
        }

        # 2. El "Puente" (Proxy) hacia tu App Spring
        location /api/ {
            proxy_pass http://app:8080; # "app" es el nombre del servicio en tu docker-compose
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}