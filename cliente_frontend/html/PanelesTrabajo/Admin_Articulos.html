<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Articulos - Sincrostock</title>
    <link rel="stylesheet" href="/css/admin_articulos.css">
</head>
<body>

<nav>
    <h2>Articulos - Sincrostock</h2>
    <hr>
    <ul style="list-style: none; padding: 0;">
        <li onclick="location.href='Direccion.html'" style="cursor:pointer; padding: 10px;"> Inicio</li>
        <li onclick="location.href='Admin_Trabajadores.html'" style="cursor:pointer; padding: 10px;">Trabajadores</li>
        <li onclick="location.href='Admin_Articulos.html'" style="cursor:pointer; padding: 10px; background: #34495e;">Productos</li>
        <li onclick="location.href='Admin_Clientes.html'" style="cursor:pointer; padding: 10px;">Clientes</li>
        
    </ul>
    <button class="btn btn-logout" onclick="logout()">Cerrar Sesión</button>
</nav>
<main>
    <div class="card">
        <h1>Gestión de Artículos</h1>
        <h2>Puedes crear, editar, borrar y ver articulos.</h2>

        <form id="form-articulo" class="form-group">
            <input type="hidden" id="articulo-id"> 
            
            <div>
                <label>Nombre:</label>
                <input type="text" id="nombre" placeholder="Nombre del producto" required>
            </div>
            <div>
                <label>Stock disponible:</label>
                <input type="number" id="stock" placeholder="0" required>
            </div>
            <div>
                <label>Precio de venta:</label>
                <input type="number" step="0.01" id="precio" placeholder="0.00" required>
            </div>
           
            <button type="submit" class="btn btn-add" id="btn-submit">Guardar Artículo</button>
            <button type="button" class="btn" id="btn-cancelar" style="display:none" onclick="resetForm()">Cancelar</button>
        </form>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Stock</th> 
                    <th>Precio</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tabla-articulos">
                <tr><td colspan="5">Cargando artículos...</td></tr>
            </tbody>
        </table>
    </div>
</main>

<script src="/js/admin_articulos.js"></script> 
</body>
</html>
